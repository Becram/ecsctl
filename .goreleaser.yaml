project_name: ecsctl

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X github.com/bikramdhoju/ecsctl/pkg/version.Version={{.Version}}
      - -X github.com/bikramdhoju/ecsctl/pkg/version.Commit={{.Commit}}
      - -X github.com/bikramdhoju/ecsctl/pkg/version.Date={{.Date}}
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
